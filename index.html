<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Admin Login | DealVoice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="hero-bg-grid"></div>
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>

    <div class="login-card">
        <div class="brand" style="justify-content: center; margin-bottom: 2rem;">
            <div class="brand-icon">
                <img src="assets/icon/logo.png" alt="DealVoice Logo">
            </div>
        </div>

        <h2 style="text-align:center; margin-bottom:0.5rem; font-weight:700;">System Admin</h2>
        <p style="text-align:center; margin-bottom:2rem; color:var(--text-2); font-size:0.9rem;">Sign in to access control panel</p>

        <div id="error" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" id="email" value="admin@softrate.com" placeholder="admin@softrate.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="password" value="Softrate@123" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.875rem;">Login to Dashboard</button>
        </form>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            const errorDiv = document.getElementById('error');
            
            submitBtn.innerText = 'Verifying...';
            submitBtn.disabled = true;
            errorDiv.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const data = await api.login(email, password);
                if (data.success && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = data.message || 'Invalid credentials';
                    submitBtn.innerText = 'Login to Dashboard';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Network Error: Could not connect to API.';
                submitBtn.innerText = 'Login to Dashboard';
                submitBtn.disabled = false;
            }
        });

        // Check if already logged in
        // though the form post will set a new one if they submit.
        const token = localStorage.getItem('adminToken');
        if (token) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
