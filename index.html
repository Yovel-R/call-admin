<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Admin Login | TraceCall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="hero-bg-grid"></div>
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>

    <div class="login-card">
        <div class="brand" style="justify-content: center; margin-bottom: 2rem;">
            <div class="brand-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M6.62 10.79C8.06 13.62 10.38 15.93 13.21 17.38L15.41 15.18C15.68 14.91 16.08 14.82 16.43 14.94C17.55 15.31 18.76 15.51 20 15.51C20.55 15.51 21 15.96 21 16.51V20C21 20.55 20.55 21 20 21C10.61 21 3 13.39 3 4C3 3.45 3.45 3 4 3H7.5C8.05 3 8.5 3.45 8.5 4C8.5 5.25 8.7 6.45 9.07 7.57C9.18 7.92 9.1 8.31 8.82 8.59L6.62 10.79Z" fill="white"/>
                </svg>
            </div>
            <span class="brand-name">TraceCall</span>
        </div>

        <h2 style="text-align:center; margin-bottom:0.5rem; font-weight:700;">System Admin</h2>
        <p style="text-align:center; margin-bottom:2rem; color:var(--text-2); font-size:0.9rem;">Sign in to access control panel</p>

        <div id="error" class="error-message"></div>

        <form id="loginForm" action="http://localhost:4000/api/admin/login-form" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" id="email" value="admin@softrate.com" placeholder="admin@softrate.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="password" value="Softrate@123" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.875rem;">Login to Dashboard</button>
        </form>
    </div>

    <script>
        // Check URL for error parameter
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.innerText = decodeURIComponent(error);
        }

        // Show loading state on submit
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = 'Verifying...';
            submitBtn.disabled = true;
        });

        // If they already have a token in local storage, we should still allow it for backward compatibility
        // though the form post will set a new one if they submit.
        const token = localStorage.getItem('adminToken');
        if (token) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
